; Color palette is owned by the theme switcher ‚ÄĒ see colors.ini.
; Edit anything else in this file freely; theme switches will not
; touch it. Only colors.ini is rewritten when you switch themes.
include-file = colors.ini


[bar/example]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

#font-0 = JetBrainsMono Nerd Font:size=12.5:weight=medium;3
font-0 = Roboto Mono Nerd Font:size=12;4
font-1 = FontAwesome:size=12;4

modules-left = xworkspaces sep xwindow
modules-center =
modules-right = filesystem sep pulseaudio sep backlight sep battery sep wlan sep memory sep cpu sep date sep hour sep lock screenshot powermenu tray

fixed-center = true

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/sep]
type = custom/text
content = |
content-foreground = ${colors.disabled}

[module/xwindow]
type = internal/xwindow
label = %title:0:100:...%
label-foreground = ${colors.foreground}

[module/filesystem]
type = internal/fs
interval = 60

mount-0 = /

label-mounted = %{F#d29922}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

;;;;;;;;;;;;;;;; BRIGHTNESS ;;;;;;;;;;;;;;;;

[module/backlight]
type = internal/backlight
; Run: ls /sys/class/backlight/ ‚ÄĒ replace with your card name
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <ramp> <label>
label = %percentage%%

ramp-0 = ůįÉö
ramp-1 = ůįÉõ
ramp-2 = ůįÉú
ramp-3 = ůįÉĚ
ramp-4 = ůįÉě
ramp-5 = ůįÉü
ramp-6 = ůįÉ†
ramp-foreground = ${colors.primary}

;;;;;;;;;;;;;;;; BATTERY ;;;;;;;;;;;;;;;;

[module/battery]
type = internal/battery
; Run: ls /sys/class/power_supply/ ‚ÄĒ replace with your names
battery = BAT0
adapter = AC
full-at = 98
low-at = 10

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <label-full>
format-low         = <animation-low> <label-low>

label-charging    = %percentage%%
label-discharging = %percentage%%
label-full        = ůįĀĻ Full
label-low         = %percentage%%

label-low-foreground = ${colors.alert}

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀľ
ramp-capacity-3 = ůįĀĹ
ramp-capacity-4 = ůįĀĺ
ramp-capacity-5 = ůįĀŅ
ramp-capacity-6 = ůįāÄ
ramp-capacity-7 = ůįāĀ
ramp-capacity-8 = ůįāā
ramp-capacity-9 = ůįĀĻ
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = ůįĘú
animation-charging-1 = ůįāÜ
animation-charging-2 = ůįāá
animation-charging-3 = ůįāą
animation-charging-4 = ůįĘĚ
animation-charging-5 = ůįāČ
animation-charging-6 = ůįĘě
animation-charging-7 = ůįāä
animation-charging-8 = ůįāč
animation-charging-9 = ůįāÖ
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

animation-low-0 = ůįāÉ
animation-low-1 = ůįāé
animation-low-framerate = 500

;;;;;;;;;;;;;;;; NETWORK ;;;;;;;;;;;;;;;;

[network-base]
type = internal/network
interval = 30
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#d29922}%ifname%%{F-} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#d29922}ůį§®%{F-} %essid% %signal%%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#d29922}ůįąÄ%{F-} %local_ip%

[module/lock]
type = internal/xkeyboard
;ignore :
format-margin = 0
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-indicator>
label-indicator-padding = 0
indicator-icon-0 = caps lock;-CL;+CL
label-indicator-off =
label-indicator-on = "  Caps "
format-foreground = ${colors.background}
format-background = ${colors.alert}

[module/memory]
type = internal/memory
interval = 5
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

;;;;;;;;;;;;;;;; CENTER MODULES ;;;;;;;;;;;;;;;;

[module/hour]
type = internal/date
interval = 30
date = %l:%M %p
date-alt = %Y-%m-%d %l:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/date]
type = custom/script
interval = 60
format = <label>
exec = date +"%a %b %-d"
# click-left = gsimplecal

[module/screenshot]
type = custom/text
content = ůįĽõ
content-foreground = ${colors.secondary}
click-left = flameshot gui

[module/powermenu]
type = custom/text
content = ůįź•
content-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/power

[module/tray]
type = internal/tray
tray-spacing = 4px


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
