#################################
# Performance / Battery First
#################################

backend = "xrender";
vsync = false;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

#################################
# Disable Everything Expensive
#################################

shadow = false;
fading = false;
corner-radius = 0;

#################################
# No Blur
#################################

# blur disabled

#################################
# No Animations
#################################

# animations disabled

#################################
# Fully Opaque
#################################

frame-opacity = 1.0;
inactive-opacity = 1.0;

#################################
# Logging
#################################

log-level = "warn";

#################################
# Rules
#################################

rules: ({
    match = "window_type = 'dock' || window_type = 'desktop'";
    shadow = false;
});
